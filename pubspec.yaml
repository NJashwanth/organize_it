name: organize_it
description: "OrganizeIt is your ultimate task management companion, designed to simplify your life and boost productivity. With features like smart categorization, customizable reminders, and a sleek interface, OrganizeIt helps you stay on top of your tasks and plans effortlessly. Whether it's personal goals or professional projects, OrganizeIt ensures everything is neatly organized in one place."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2


dependencies:
  # Flutter SDK
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^4.0.0

  # Networking
  dio: ^5.7.0

  # Utilities
  equatable: ^2.0.7
  flutter_hooks: ^0.21.2

  # Codegen / serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.1
  lifecycle_logger: ^0.0.1

dev_dependencies:
  # Testing
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  flutter_mock_server: ^1.0.0

  # Lints
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.6
  freezed: ^3.2.3
  json_serializable: ^6.7.1
  riverpod_generator: ^4.0.0+1
# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
